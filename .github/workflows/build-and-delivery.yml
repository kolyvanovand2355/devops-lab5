name: Build and Delivery
on:
  workflow_run:
    workflows: ["Test Python App"]
    types: [completed]
    branches: [main]

jobs:
  cd:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: kolyvanovand2355
          # Токен должен быть добавлен в Settings -> Secrets вашего GitHub
          password: ${{ secrets.DOCKERHUB_TOKEN }} #PAT docker
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: kolyvanovand2355/my-app:latest

